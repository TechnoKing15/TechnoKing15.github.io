<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta http-equiv="X-UA-Compatible" content="IE=Edge">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
        <link rel="stylesheet" href="style.css">
        <title>Dimitris Skaronis</title>

    <body>

        <!-- Background glow orbs -->
        <div class="bg-orb bg-orb--purple"></div>
        <div class="bg-orb bg-orb--blue"></div>
        <div class="bg-orb bg-orb--magenta"></div>

        <nav class="nav">
            <div class="nav__inner">

        <main>
            <section class="hero">

                    <div class="hero__badge">Personal Site</div>

                        Nice to meet you.
                    </h1>
                    <p class="hero__subtitle">This is a work in progress. Ok?</p>

                <!-- Decorative card -->
                <div class="hero__card glass-card">
                    <div class="card__dot card__dot--green"></div>

                    <p class="card__value">Building something cool</p>
