name: Update Content

on:
  schedule:
    # Runs every 15 minutes
    - cron: '*/15 * * * *'
  # Allows manual trigger from the Actions tab
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build blog from existing markdown
        run: node scripts/update-blog.js

      - name: Import new posts from Substack RSS
        run: node scripts/update-posts.js

      - name: Rebuild blog with newly imported posts
        run: node scripts/update-blog.js

      - name: Commit and push changes
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add posts/ blog/ blog-posts.json
          git diff --cached --quiet || (
            git commit -m "sync: update blog from Substack"
            git push
          )
